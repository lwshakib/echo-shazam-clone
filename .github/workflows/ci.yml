name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Server Dependencies
        run: |
          cd server
          bun install

      - name: Check Formatting
        run: |
          cd server
          bun x prettier --check .

      - name: Verify Server Build & Run Tests
        run: |
          cd server
          bun build ./index.ts --outdir ./dist --target bun
          # Run tests
          bun test

  worker-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Worker Dependencies
        run: |
          cd fingerprint-generator
          python -m pip install --upgrade pip
          pip install fastapi uvicorn librosa numpy scipy requests python-dotenv python-multipart PyJWT pytest httpx black

      - name: Lint & Test Worker
        run: |
          cd fingerprint-generator
          # Code style check (Black)
          black --check .
          # Simple compilation check
          python -m py_compile main.py
          # Run tests
          pytest tests/

  extension-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Extension Dependencies
        run: |
          cd chrome_extension
          bun install

      - name: Check Formatting
        run: |
          cd chrome_extension
          bun x prettier --check .

      - name: Build Extension & Run UI Tests
        run: |
          cd chrome_extension
          bun install
          # Run UI tests
          bun x vitest run
          # Build
          bun run build
